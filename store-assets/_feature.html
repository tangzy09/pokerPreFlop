<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1024px;height:500px;overflow:hidden}
  body{font-family:'Segoe UI',system-ui,sans-serif;color:#eaf2ec;
    background:radial-gradient(120% 140% at 15% 10%,#1f3022,#13201a 55%,#0e1712)}
  .wrap{display:flex;height:100%;align-items:center;padding:0 60px;gap:24px}
  .left{flex:1;min-width:0}
  .suits{font-size:34px;letter-spacing:8px;margin-bottom:16px}
  .suits .b{color:#10180f;text-shadow:0 1px 0 rgba(255,255,255,.12)}
  .suits .r{color:#e05a5a}
  .title{font-weight:800;font-size:60px;line-height:1.04;letter-spacing:-1.5px}
  .title .g{color:#e8c66a}
  .tag{margin-top:18px;font-size:22px;color:#a6bcad;line-height:1.45;max-width:540px}
  .badges{margin-top:24px;display:flex;gap:11px;flex-wrap:wrap}
  .badge{font-size:15px;font-weight:700;padding:8px 15px;border-radius:999px;
    border:1px solid rgba(232,198,106,.42);color:#e8c66a;background:rgba(232,198,106,.08)}
  .phone{width:286px;flex:none;border-radius:32px;overflow:hidden;transform:rotate(3.5deg);
    box-shadow:0 34px 64px -16px rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.09)}
  .phone img{width:100%;display:block}
</style></head><body>
  <div class="wrap">
    <div class="left">
      <div class="suits"><span class="b">&spades;</span> <span class="r">&hearts;</span> <span class="r">&diams;</span> <span class="b">&clubs;</span></div>
      <div class="title">PreFlop <span class="g">GTO</span><br>Poker Trainer</div>
      <div class="tag">Honest pre-flop drills, a personal leak finder &amp; a 20-day plan. Offline. Free core.</div>
      <div class="badges"><span class="badge">Honest GTO</span><span class="badge">Offline</span><span class="badge">Free core</span></div>
    </div>
    <div class="phone"><img src="new-1-home-en.png" alt=""></div>
  </div>
</body></html>
