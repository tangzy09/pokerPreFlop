# Codemagic CI/CD —— 云端 macOS 构建 iOS app 并上传 TestFlight
# 流程照搬 japansese-study/codemagic.yaml(Mando 已验证跑通),与 poker-post-flop/codemagic.yaml 同构。
# 为什么选 Codemagic 而非 IOS_SETUP.md 原来的 GitHub Actions 路线:
#   自动签名 —— 用账号级 App Store Connect API Key 自动创建/拉取发布证书 + 描述文件,
#   免掉 GH Actions 路线最麻烦的一步(openssl 手搓 CSR/p12 + 6 个 secrets)。
#   账号级资产(ASC API Key 集成 / CERTIFICATE_PRIVATE_KEY)已在 japanese-study 配好,直接复用。
# 一次性设置见 IOS_SETUP.md(Codemagic 路线只需其中第 1/2 步 + Codemagic 加仓库)。
#
# RevenueCat v13.2.x 无需移除(japanese-study 是 v8 的 SubscriptionPeriod 撞名才被迫拆,已修),
# IAP 随包构建;TestFlight 阶段 appl_ key 为占位,Pay.init 报 warn 后空跑,不影响使用。

workflows:

  preflop-testflight:
    name: Preflop Camp iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: ASC API Key   # 账号级集成,与 japanese-study / postflop 共用;名字须与 Codemagic 后台一字不差

    environment:
      groups:
        - ios_signing                          # 含 CERTIFICATE_PRIVATE_KEY(账号里已有;在本 app 的 Environment variables 挂上这个组)
      vars:
        BUNDLE_ID: "com.pokerpreflop.trainer"  # 与 capacitor.config.json 的 appId 一致
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        # ↓ App Store Connect 创建本 app 记录后拿到的数字 Apple ID(IOS_SETUP.md 第 2 步)
        APP_STORE_APP_ID: "6787507770"
      node: 22           # Capacitor 8 CLI 要求 Node ≥22(node:20 实测 fatal)
      xcode: latest        # 苹果强制新 SDK 才可上传;若某次升级把构建搞挂,钉成上次成功版本
      cocoapods: default

    scripts:
      - name: 装 npm 依赖
        script: npm ci

      - name: 测试门禁 + 构建 web 产物到 www
        script: |
          npm test             # node 测试全绿才继续(python solver 回归不在云端跑,本地把关)
          npm run build:www

      - name: 确保 iOS 工程存在 + 同步 web 产物
        script: |
          # 首选:ios/ 已入库(含定制 Info.plist「Preflop Camp」+ 矢量源生成的 AppIcon)→ 只 sync。
          # 兜底:ios/ 不在仓库时现场生成并补两项定制(此时 AppIcon 是 Capacitor 默认图,记得尽快入库 ios/)。
          if [ ! -d ios/App ]; then
            npx cap add ios
            plutil -replace CFBundleDisplayName -string "Preflop Camp" ios/App/App/Info.plist
          fi
          plutil -replace ITSAppUsesNonExemptEncryption -bool false ios/App/App/Info.plist
          npx cap sync ios

      - name: 拉取/创建签名文件(用 CERTIFICATE_PRIVATE_KEY 建发布证书 + 描述文件)+ 诊断
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          set +e
          xcode-project use-profiles
          echo "========== 签名诊断 =========="
          echo "[工程 bundle id]"; grep -m3 "PRODUCT_BUNDLE_IDENTIFIER" ios/App/App.xcodeproj/project.pbxproj || true
          echo "[已装描述文件]"; ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(目录为空/不存在)"
          echo "[代码签名身份]"; security find-identity -v -p codesigning || true
          echo "=============================="

      - name: 递增构建号(取 TestFlight 上最新 +1)
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      - name: 构建 IPA
        script: |
          # Cap8 默认 SPM(无 Podfile→无 .xcworkspace)→ 用 --project;有 Podfile 才有 workspace
          if [ -d ios/App/App.xcworkspace ]; then
            xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa --project ios/App/App.xcodeproj --scheme "$XCODE_SCHEME"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - tangzy09@gmail.com
        notify:
          success: true
          failure: true
